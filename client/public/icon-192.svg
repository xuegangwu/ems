<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="32" fill="#EEF2F8"/>
  <!-- Solar panel grid -->
  <rect x="30" y="40" width="60" height="50" rx="6" fill="#4F7FE8" opacity="0.15"/>
  <rect x="30" y="40" width="60" height="50" rx="6" fill="none" stroke="#4F7FE8" stroke-width="2"/>
  <line x1="50" y1="40" x2="50" y2="90" stroke="#4F7FE8" stroke-width="1.5" opacity="0.5"/>
  <line x1="70" y1="40" x2="70" y2="90" stroke="#4F7FE8" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="60" x2="90" y2="60" stroke="#4F7FE8" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="80" x2="90" y2="80" stroke="#4F7FE8" stroke-width="1.5" opacity="0.5"/>
  <!-- Sun -->
  <circle cx="140" cy="50" r="14" fill="#FFB020" opacity="0.9"/>
  <path d="M140 30 Q152 42 140 54 Q128 42 140 30" stroke="#FFB020" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M140 66 Q152 54 140 42 Q128 54 140 66" stroke="#FFB020" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M120 50 Q132 38 144 50 Q132 62 120 50" stroke="#FFB020" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M136 30 Q124 42 136 54 Q148 42 136 30" stroke="#FFB020" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Battery / storage -->
  <rect x="66" y="110" width="60" height="36" rx="6" fill="#ffffff" stroke="#4F7FE8" stroke-width="2"/>
  <rect x="86" y="106" width="20" height="6" rx="2" fill="#4F7FE8"/>
  <rect x="70" y="118" width="14" height="20" rx="2" fill="#4F7FE8" opacity="0.8"/>
  <rect x="88" y="118" width="14" height="20" rx="2" fill="#4F7FE8" opacity="0.5"/>
  <rect x="106" y="118" width="14" height="20" rx="2" fill="#4F7FE8" opacity="0.25"/>
  <!-- Connecting arrows -->
  <path d="M80 90 L80 110" stroke="#4F7FE8" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M112 90 L112 110" stroke="#FFB020" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Energy flow arcs -->
  <path d="M30 140 Q 20 160 30 175" stroke="#4F7FE8" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M162 130 Q 172 155 162 172" stroke="#4F7FE8" stroke-width="2" fill="none" opacity="0.4"/>
  <circle cx="30" cy="178" r="6" fill="#4F7FE8" opacity="0.5"/>
  <circle cx="162" cy="175" r="6" fill="#4F7FE8" opacity="0.5"/>
  <!-- Label -->
  <text x="96" y="168" font-family="system-ui,sans-serif" font-size="11" fill="#4F7FE8" text-anchor="middle" font-weight="600">EnOS</text>
</svg>